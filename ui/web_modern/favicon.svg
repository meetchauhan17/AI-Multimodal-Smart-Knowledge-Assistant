<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant Modern Gradients -->
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B5179E" />
      <stop offset="100%" stop-color="#7209B7" />
    </linearGradient>

    <linearGradient id="grad-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB703" />
      <stop offset="100%" stop-color="#FB8500" />
    </linearGradient>

    <linearGradient id="grad-spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E0E7FF" />
    </linearGradient>

    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Transparent background (no box) -->

  <!-- 3D Multimodal Diamond Node Layer 1 (Bottom Left - Audio Waves) -->
  <path d="M256 64 L416 160 L256 256 L96 160 Z" 
        fill="url(#grad-cyan)" 
        opacity="0.9" />

  <!-- 3D Multimodal Diamond Node Layer 2 (Bottom Right - Vision) -->
  <path d="M256 256 L416 160 L416 352 L256 448 Z" 
        fill="url(#grad-purple)" 
        opacity="0.95" />

  <!-- 3D Multimodal Diamond Node Layer 3 (Left Face - Knowledge) -->
  <path d="M96 160 L256 256 L256 448 L96 352 Z" 
        fill="url(#grad-gold)" 
        opacity="0.9" />

  <!-- Glowing Inner Neural Network Lines -->
  <path d="M256 64 V448 M96 160 L416 352 M416 160 L96 352" 
        stroke="#FFFFFF" 
        stroke-width="5" 
        stroke-linecap="round" 
        opacity="0.4" />

  <!-- Central Floating AI Core Spark Star -->
  <g filter="url(#soft-glow)">
    <path d="M256 196 L270 242 L316 256 L270 270 L256 316 L242 270 L196 256 L242 242 Z" 
          fill="url(#grad-spark)" />
  </g>

  <!-- Sparkle Accent 1 (Top Right) -->
  <path d="M380 90 L386 108 L404 114 L386 120 L380 138 L374 120 L356 114 L374 108 Z" fill="#00F2FE" />

  <!-- Sparkle Accent 2 (Bottom Left) -->
  <path d="M130 380 L134 394 L148 398 L134 402 L130 416 L126 402 L112 398 L126 394 Z" fill="#FFB703" />

  <!-- Outer Orbit Nodes -->
  <circle cx="256" cy="64" r="12" fill="#00F2FE" stroke="#FFFFFF" stroke-width="4" />
  <circle cx="416" cy="160" r="12" fill="#B5179E" stroke="#FFFFFF" stroke-width="4" />
  <circle cx="416" cy="352" r="12" fill="#7209B7" stroke="#FFFFFF" stroke-width="4" />
  <circle cx="256" cy="448" r="12" fill="#FFB703" stroke="#FFFFFF" stroke-width="4" />
  <circle cx="96" cy="352" r="12" fill="#FB8500" stroke="#FFFFFF" stroke-width="4" />
  <circle cx="96" cy="160" r="12" fill="#4FACFE" stroke="#FFFFFF" stroke-width="4" />
</svg>
