<!-- Style 4: Isometric 3D -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Isometric Group -->
  <g transform="translate(256, 120) scale(1.4)">
    <!-- Top Face -->
    <polygon points="0,0 80,46 0,92 -80,46" fill="#A78BFA"/>
    <!-- Left Face -->
    <polygon points="-80,46 0,92 0,184 -80,138" fill="#7C3AED"/>
    <!-- Right Face -->
    <polygon points="0,92 80,46 80,138 0,184" fill="#4C1D95"/>
    
    <!-- Floating Node Top -->
    <polygon points="0,-40 30,-23 0,-5 -30,-23" fill="#F472B6"/>
    <polygon points="-30,-23 0,-5 0,25 -30,7" fill="#DB2777"/>
    <polygon points="0,-5 30,-23 30,7 0,25" fill="#9D174D"/>
    
    <!-- Connection line -->
    <line x1="0" y1="-5" x2="0" y2="46" stroke="#FBCFE8" stroke-width="4" stroke-dasharray="4 4"/>
  </g>
</svg>
