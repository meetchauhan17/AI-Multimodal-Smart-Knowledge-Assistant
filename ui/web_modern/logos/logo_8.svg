<!-- Concept 8: Minimalist Robot Assistant Emblem (Midjourney/Apple Style) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="c8-bot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="c8-visor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="190" fill="url(#c8-bot)" stroke="url(#c8-visor)" stroke-width="14"/>
  <!-- Minimalist Visor Stroke Arc -->
  <path d="M 160 256 Q 256 190 352 256" fill="none" stroke="url(#c8-visor)" stroke-width="26" stroke-linecap="round"/>
  <circle cx="256" cy="223" r="14" fill="#FFFFFF"/>
