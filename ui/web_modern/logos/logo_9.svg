<!-- Style 9: Origami / Low Poly -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Central Diamond folding out -->
  <polygon points="256,60 380,180 256,256 132,180" fill="#60A5FA"/>
  <polygon points="380,180 440,320 256,440 256,256" fill="#3B82F6"/>
  <polygon points="256,256 256,440 72,320 132,180" fill="#2563EB"/>
  
  <!-- Outer folds -->
  <polygon points="256,60 440,120 380,180" fill="#93C5FD"/>
  <polygon points="256,60 132,180 72,120" fill="#1D4ED8"/>
  <polygon points="440,120 490,260 440,320 380,180" fill="#1E40AF"/>
  <polygon points="72,120 132,180 72,320 22,260" fill="#1E3A8A"/>
  
  <!-- Glowing center node -->
  <circle cx="256" cy="256" r="20" fill="#FDE047"/>
  <circle cx="256" cy="256" r="8" fill="#FFFFFF"/>
</svg>
