<!-- Style 7: Bauhaus Abstract -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Primary colors, stark geometry -->
  <rect x="0" y="0" width="512" height="512" fill="#FDF8EE"/>
  
  <circle cx="256" cy="256" r="160" fill="#DA291C"/>
  <rect x="256" y="96" width="160" height="320" fill="#0033A0"/>
  
  <polygon points="96,416 256,416 96,256" fill="#FFC72C"/>
  <polygon points="416,96 256,96 416,256" fill="#FFC72C"/>
  
  <!-- Central eye/node -->
  <circle cx="256" cy="256" r="40" fill="#FDF8EE"/>
  <circle cx="256" cy="256" r="16" fill="#DA291C"/>
</svg>
