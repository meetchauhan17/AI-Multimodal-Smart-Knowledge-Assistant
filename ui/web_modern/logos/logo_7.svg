<!-- UI Matching Concept 7: Overlapping Sketch Speech Bubble & Vision Lens -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Speech Bubble (Audio) -->
  <path d="M 120 160 C 120 110, 300 110, 300 160 C 300 210, 240 230, 200 230 L 160 270 V 230 C 130 230, 120 200, 120 160 Z" fill="#fff9c4" stroke="#2d2d2d" stroke-width="12" stroke-linejoin="round"/>
  <!-- Camera Lens (Vision) -->
  <circle cx="330" cy="310" r="100" fill="#2d5da1" stroke="#2d2d2d" stroke-width="12"/>
  <circle cx="330" cy="310" r="45" fill="#fff" stroke="#2d2d2d" stroke-width="8"/>
  <circle cx="330" cy="310" r="20" fill="#e74c3c"/>
</svg>
