<!-- UI Matching Concept 9: Hand-Drawn Monogram M Badge with Yellow Tape -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Yellow Tape Strip at Top -->
  <rect x="180" y="45" width="152" height="40" rx="6" fill="rgba(232,218,185,0.9)" stroke="#2d2d2d" stroke-width="4" transform="rotate(-3 256 65)"/>
  <!-- Sticky Note Box -->
  <rect x="100" y="70" width="312" height="370" rx="25" fill="#fff9c4" stroke="#2d2d2d" stroke-width="14"/>
  <!-- Ink "M" Stroke -->
  <path d="M 150 370 V 160 L 256 290 L 362 160 V 370" fill="none" stroke="#2d2d2d" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Blue Underline -->
  <path d="M 150 400 H 362" stroke="#2d5da1" stroke-width="14" stroke-linecap="round"/>
</svg>
