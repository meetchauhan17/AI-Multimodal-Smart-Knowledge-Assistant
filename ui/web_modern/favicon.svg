<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium 3-Stop Ultra-Smooth Gradient -->
    <linearGradient id="iconic-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#FF007F" />
    </linearGradient>

    <linearGradient id="inner-glow-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>

    <!-- Crisp Soft Ambient Glow Filter -->
    <filter id="ambient-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Transparent Background (No background box) -->

  <!-- Outer Layer: Bold Fluid Mobius "M" Loop -->
  <path d="M 96 380 
           V 180 
           C 96 110, 160 110, 196 160 
           L 256 248 
           L 316 160 
           C 352 110, 416 110, 416 180 
           V 380" 
        fill="none" 
        stroke="url(#iconic-gradient)" 
        stroke-width="48" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#ambient-glow)" />

  <!-- Inner Layer: High-Contrast Core Accent Stream -->
  <path d="M 120 370 
           V 185 
           C 120 135, 160 135, 190 170 
           L 256 262 
           L 322 170 
           C 352 135, 392 135, 392 185 
           V 370" 
        fill="none" 
        stroke="url(#inner-glow-grad)" 
        stroke-width="18" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        opacity="0.95" />

  <!-- Central AI Core Diamond Star (Crisp Floating Element) -->
  <path d="M 256 90 
           L 268 122 
           L 300 134 
           L 268 146 
           L 256 178 
           L 244 146 
           L 212 134 
           L 244 122 Z" 
        fill="#FFFFFF" 
        filter="url(#ambient-glow)" />
</svg>
