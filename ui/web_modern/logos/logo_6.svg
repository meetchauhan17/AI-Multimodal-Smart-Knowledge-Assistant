<!-- Style 6: Retro-Futuristic Cyberpunk Grid -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" style="background-color: #09090B;">
  <defs>
    <!-- Neon Glow Filter -->
    <filter id="s6-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Perspective Grid -->
  <g stroke="#E81CFF" stroke-width="2" opacity="0.3">
    <line x1="0" y1="350" x2="512" y2="350"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="0" y1="470" x2="512" y2="470"/>
    <!-- Vertical Perspective -->
    <line x1="256" y1="300" x2="256" y2="512"/>
    <line x1="256" y1="300" x2="100" y2="512"/>
    <line x1="256" y1="300" x2="412" y2="512"/>
    <line x1="256" y1="300" x2="-50" y2="512"/>
    <line x1="256" y1="300" x2="562" y2="512"/>
  </g>
  
  <!-- Glowing Sun / Core -->
  <circle cx="256" cy="220" r="80" fill="#00F0FF" filter="url(#s6-glow)"/>
  
  <!-- Abstract Vector Mountain / Triangle -->
  <polygon points="120,350 256,120 392,350" fill="none" stroke="#E81CFF" stroke-width="8" filter="url(#s6-glow)"/>
  <polygon points="150,350 256,160 362,350" fill="none" stroke="#00F0FF" stroke-width="4" filter="url(#s6-glow)"/>
</svg>
