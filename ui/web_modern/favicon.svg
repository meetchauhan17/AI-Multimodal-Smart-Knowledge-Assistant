<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant 4-Stop Neon Multimodal Gradient -->
    <linearGradient id="m-ribbon-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="35%" stop-color="#3B82F6" />
      <stop offset="70%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <linearGradient id="m-ribbon-secondary" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="50%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <linearGradient id="spark-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FDE047" />
    </linearGradient>

    <!-- Soft Glow Effect -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Transparent Background (No background box) -->

  <!-- Outer Orbital Signal Ring (Multimodal Audio & Vision Flow) -->
  <path d="M 100 256 A 156 156 0 1 1 412 256" 
        fill="none" 
        stroke="url(#m-ribbon-primary)" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-dasharray="24 14" 
        opacity="0.65" />

  <!-- Layer 1: Base Shadow Ribbon Curve -->
  <path d="M 88 390 V 160 C 88 120, 150 120, 180 160 L 256 270 L 332 160 C 362 120, 424 120, 424 160 V 390" 
        fill="none" 
        stroke="#1E1B4B" 
        stroke-width="38" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        opacity="0.3" />

  <!-- Layer 2: Main Dynamic Multimodal "M" Fluid Ribbon -->
  <path d="M 88 390 V 160 C 88 120, 150 120, 180 160 L 256 270 L 332 160 C 362 120, 424 120, 424 160 V 390" 
        fill="none" 
        stroke="url(#m-ribbon-primary)" 
        stroke-width="32" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#neon-glow)" />

  <!-- Layer 3: Inner Accent Wave Flare -->
  <path d="M 180 160 L 256 270 L 332 160" 
        fill="none" 
        stroke="url(#m-ribbon-secondary)" 
        stroke-width="14" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        opacity="0.85" />

  <!-- Central Intelligence AI Core Spark (Top Apex) -->
  <g filter="url(#neon-glow)">
    <path d="M 256 80 L 268 112 L 300 124 L 268 136 L 256 168 L 244 136 L 212 124 L 244 112 Z" 
          fill="url(#spark-grad)" />
  </g>

  <!-- Multimodal Node Spheres -->
  <!-- Audio STT Node (Left) -->
  <circle cx="88" cy="390" r="18" fill="#00F2FE" stroke="#FFFFFF" stroke-width="6" />

  <!-- Vision Node (Right) -->
  <circle cx="424" cy="390" r="18" fill="#EC4899" stroke="#FFFFFF" stroke-width="6" />

  <!-- Central RAG Convergence Node (Center Mid) -->
  <circle cx="256" cy="270" r="12" fill="#FDE047" stroke="#2D2D2D" stroke-width="4" />
</svg>
