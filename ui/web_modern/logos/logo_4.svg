<!-- Option 4: RAG Document & Live Web Search Globe -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Globe Contour (Web Search) -->
  <circle cx="310" cy="310" r="130" fill="#fdfbf7" stroke="#2d2d2d" stroke-width="12"/>
  <ellipse cx="310" cy="310" rx="130" ry="50" fill="none" stroke="#2d5da1" stroke-width="8"/>
  <line x1="310" y1="180" x2="310" y2="440" stroke="#2d5da1" stroke-width="8"/>
  <!-- Vector RAG Document Sheet -->
  <rect x="90" y="90" width="190" height="250" rx="15" fill="#fff9c4" stroke="#2d2d2d" stroke-width="12"/>
  <!-- Document Lines -->
  <line x1="120" y1="140" x2="250" y2="140" stroke="#2d2d2d" stroke-width="10" stroke-linecap="round"/>
  <line x1="120" y1="180" x2="230" y2="180" stroke="#2d2d2d" stroke-width="10" stroke-linecap="round"/>
  <line x1="120" y1="220" x2="210" y2="220" stroke="#2d2d2d" stroke-width="10" stroke-linecap="round"/>
  <!-- Pin -->
  <circle cx="260" cy="95" r="14" fill="#e74c3c" stroke="#2d2d2d" stroke-width="5"/>
</svg>
