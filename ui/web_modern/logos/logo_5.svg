<!-- New Concept 5: Cyber Robot Sphere with Visor -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="n5-head" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="n5-visor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>
  </defs>
  <!-- Sphere Head Contour -->
  <circle cx="256" cy="256" r="180" fill="url(#n5-head)" stroke="#38BDF8" stroke-width="14"/>
  <!-- Curved Panoramic Visor Lens -->
  <path d="M 110 240 Q 256 160 402 240 Q 402 280 402 280 Q 256 310 110 280 Z" fill="url(#n5-visor)"/>
  <!-- Dual Glowing Vision Pupil Nodes -->
  <circle cx="200" cy="250" r="16" fill="#FFFFFF"/>
  <circle cx="312" cy="250" r="16" fill="#FFFFFF"/>
  <!-- Side Ear Antennas -->
  <rect x="56" y="220" width="20" height="70" rx="10" fill="#F59E0B"/>
  <rect x="436" y="220" width="20" height="70" rx="10" fill="#F59E0B"/>
</svg>
