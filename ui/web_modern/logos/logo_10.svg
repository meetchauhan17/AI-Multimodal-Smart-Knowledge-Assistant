<!-- Style 10: Soft Claymorphism -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Heavy drop shadow -->
    <filter id="s10-drop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="10" dy="20" stdDeviation="15" flood-color="#0F172A" flood-opacity="0.15"/>
    </filter>
    <!-- Heavy inner shadow for clay effect -->
    <filter id="s10-inner" x="-20%" y="-20%" width="140%" height="140%">
      <!-- Drop shadow -->
      <feDropShadow dx="15" dy="25" stdDeviation="20" flood-color="#334155" flood-opacity="0.2"/>
      <!-- Inner shadow top-left light -->
      <feOffset dx="15" dy="15"/>
      <feGaussianBlur stdDeviation="20" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow1"/>
      
      <!-- Inner shadow bottom-right dark -->
      <feOffset dx="-15" dy="-15" in="SourceGraphic"/>
      <feGaussianBlur stdDeviation="20" result="offset-blur2"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur2" result="inverse2"/>
      <feFlood flood-color="black" flood-opacity="0.2" result="color2"/>
      <feComposite operator="in" in="color2" in2="inverse2" result="shadow2"/>
      
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="shadow1"/>
        <feMergeNode in="shadow2"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect x="0" y="0" width="512" height="512" fill="#F8FAFC"/>
  
  <!-- Clay base card -->
  <rect x="96" y="96" width="320" height="320" rx="80" fill="#E2E8F0" filter="url(#s10-inner)"/>
  
  <!-- Clay floating elements -->
  <circle cx="256" cy="220" r="60" fill="#F472B6" filter="url(#s10-inner)"/>
  <rect x="180" y="280" width="152" height="60" rx="30" fill="#38BDF8" filter="url(#s10-inner)"/>
  
  <circle cx="150" cy="150" r="30" fill="#FBBF24" filter="url(#s10-inner)"/>
  <circle cx="370" cy="350" r="40" fill="#A78BFA" filter="url(#s10-inner)"/>
</svg>
