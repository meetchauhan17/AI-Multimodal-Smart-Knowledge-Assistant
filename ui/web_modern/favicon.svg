<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Ultra Modern Neon Gradients -->
    <linearGradient id="neon-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <linearGradient id="cyan-spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>

    <linearGradient id="gold-bright" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>

    <filter id="neon-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Transparent Background (No background box) -->

  <!-- Outer Cyber Orbit Arc -->
  <path d="M 90 256 A 166 166 0 1 1 422 256" fill="none" stroke="url(#cyan-spark)" stroke-width="12" stroke-linecap="round" stroke-dasharray="28 14" opacity="0.8" />

  <!-- Core Multimodal Loop Emblem (Infinity / Brain M Loop) -->
  <path d="M140 330 C120 230 180 140 256 210 C332 140 392 230 372 330 C356 390 290 380 256 310 C222 380 156 390 140 330 Z" 
        fill="none" 
        stroke="url(#neon-glow)" 
        stroke-width="22" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#neon-filter)" />

  <!-- Inner Spark Star Core -->
  <path d="M256 160 L266 200 L306 210 L266 220 L256 260 L246 220 L206 210 L246 200 Z" fill="url(#gold-bright)" />

  <!-- Voice Audio Waves Left -->
  <path d="M 60 210 Q 75 256 60 302" fill="none" stroke="#38BDF8" stroke-width="10" stroke-linecap="round" />
  <path d="M 38 230 Q 48 256 38 282" fill="none" stroke="#818CF8" stroke-width="8" stroke-linecap="round" />

  <!-- Vision Iris Arc Right -->
  <path d="M 452 210 Q 437 256 452 302" fill="none" stroke="#EC4899" stroke-width="10" stroke-linecap="round" />
  <path d="M 474 230 Q 464 256 474 282" fill="none" stroke="#FBBF24" stroke-width="8" stroke-linecap="round" />

  <!-- Floating Sparkles -->
  <circle cx="130" cy="130" r="10" fill="#38BDF8" />
  <circle cx="382" cy="130" r="10" fill="#EC4899" />
  <circle cx="256" cy="420" r="12" fill="#FBBF24" />
</svg>
