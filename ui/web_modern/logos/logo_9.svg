<!-- New Concept 9: AI Wave Crest Badge -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="n9-crest" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="n9-wave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
  </defs>
  <!-- Circular Badge Plate -->
  <circle cx="256" cy="256" r="200" fill="url(#n9-crest)" stroke="#6366F1" stroke-width="14"/>
  <!-- Sine Wave Overlay -->
  <path d="M 96 256 Q 176 150 256 256 T 416 256" fill="none" stroke="url(#n9-wave)" stroke-width="24" stroke-linecap="round"/>
  <path d="M 96 256 Q 176 362 256 256 T 416 256" fill="none" stroke="url(#n9-wave)" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
  <!-- Central Spark -->
  <circle cx="256" cy="256" r="24" fill="#FBBF24"/>
</svg>
