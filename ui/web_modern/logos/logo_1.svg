  <!-- Eyes -->
  <circle cx="210" cy="230" r="22" fill="#fff" stroke="#2d2d2d" stroke-width="6"/>
  <circle cx="302" cy="230" r="22" fill="#fff" stroke="#2d2d2d" stroke-width="6"/>
  <circle cx="214" cy="226" r="8" fill="#2d2d2d"/>
  <circle cx="306" cy="226" r="8" fill="#2d2d2d"/>
