<!-- Style 1: Neo-Brutalism -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background offset shadow -->
  <rect x="120" y="120" width="280" height="280" rx="16" fill="#111827"/>
  <!-- Main shape -->
  <rect x="100" y="100" width="280" height="280" rx="16" fill="#FDE047" stroke="#111827" stroke-width="12"/>
  
  <circle cx="200" cy="200" r="40" fill="#EC4899" stroke="#111827" stroke-width="10"/>
  <rect x="260" y="260" width="80" height="80" fill="#3B82F6" stroke="#111827" stroke-width="10"/>
  
  <!-- Brutalist Star -->
  <path d="M 120 340 L 160 350 L 170 390 L 180 350 L 220 340 L 180 330 L 170 290 L 160 330 Z" fill="#22C55E" stroke="#111827" stroke-width="8" stroke-linejoin="round"/>
</svg>
