<!-- New Concept 6: Minimalist Sound Pulse & Camera Aperture Iris -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="n6-pulse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Concentric Soundwave Pulse Rings -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#n6-pulse)" stroke-width="12" opacity="0.4"/>
  <circle cx="256" cy="256" r="165" fill="none" stroke="url(#n6-pulse)" stroke-width="14" stroke-dasharray="30 15"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#n6-pulse)" stroke-width="16"/>
  <!-- Central Aperture Iris Polygon -->
  <polygon points="256,176 325,216 325,296 256,336 187,296 187,216" fill="#F59E0B"/>
  <circle cx="256" cy="256" r="32" fill="#FFFFFF"/>
</svg>
